[workspace]
members = ["crates/copro-core", "crates/copro-provider-openai"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
copro-core = { path = "crates/copro-core" }

async-openai = { version = "0.40.2", default-features = false, features = [
    "byot",
    "model",
    "responses",
    "rustls",
] }
async-stream = "0.3"
base64 = "0.22"
config = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
futures-util = "0.3"
schemars = "1.2.1"
thiserror = "2"
tokio = { version = "1", features = ["time"] }
